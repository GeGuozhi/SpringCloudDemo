<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>分布式聊天系统</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .chat-container {
            width: 100%;
            height: 100%;
            max-width: 1200px;
            max-height: 900px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 头部样式 */
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            flex-shrink: 0;
            position: relative;
            z-index: 10;
        }

        .status-indicator {
            position: absolute;
            top: 50%;
            right: 20px;
            transform: translateY(-50%);
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4caf50;
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.5);
        }

        .status-indicator.disconnected {
            background: #f44336;
        }

        /* 登录表单样式 */
        .login-form {
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            flex: 1;
        }

        .login-form h2 {
            margin-bottom: 25px;
            color: #333;
            font-size: 22px;
            text-align: center;
        }

        .login-form input {
            width: 100%;
            max-width: 300px;
            padding: 12px 15px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .login-form input:focus {
            outline: none;
            border-color: #667eea;
        }

        .login-form button {
            width: 100%;
            max-width: 300px;
            padding: 12px;
            margin-top: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .login-form button:hover {
            transform: scale(1.03);
        }

        /* 聊天主体样式 */
        .chat-body {
            display: none;
            flex-direction: column;
            height: 100%;
            flex: 1;
            overflow: hidden;
        }

        .user-info {
            padding: 10px 15px;
            background: #f8f9fa;
            border-bottom: 1px solid #e0e0e0;
            font-size: 14px;
            color: #666;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .user-info button {
            padding: 6px 12px;
            background: #f44336;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }

        .user-info button:hover {
            background: #d32f2f;
        }

        /* 消息容器样式 */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
        }

        .message {
            margin-bottom: 12px;
            padding: 10px 14px;
            border-radius: 10px;
            max-width: 85%;
            word-wrap: break-word;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.own {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-left: auto;
            text-align: right;
        }

        .message.other {
            background: white;
            color: #333;
            margin-right: auto;
            border: 1px solid #e0e0e0;
        }

        .message.system {
            background: #fff3cd;
            color: #856404;
            margin: 8px auto;
            text-align: center;
            max-width: 90%;
            border: 1px solid #ffeaa7;
            font-size: 13px;
        }

        .message-header {
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 4px;
            opacity: 0.8;
        }

        .message-content {
            font-size: 14px;
            line-height: 1.4;
        }

        .message-time {
            font-size: 10px;
            margin-top: 4px;
            opacity: 0.7;
        }

        /* 输入区域样式 */
        .input-container {
            padding: 15px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }

        .input-container input {
            flex: 1;
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 20px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .input-container input:focus {
            outline: none;
            border-color: #667eea;
        }

        .input-container button {
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            white-space: nowrap;
        }

        .input-container button:hover {
            transform: scale(1.05);
        }

        .input-container button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 新消息指示器 */
        .new-message-indicator {
            position: fixed;
            bottom: 80px;
            right: 20px;
            background: #667eea;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
            display: none;
            z-index: 100;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            body {
                padding: 5px;
            }

            .chat-container {
                border-radius: 10px;
                max-height: 100%;
            }

            .chat-header {
                padding: 12px 15px;
                font-size: 18px;
            }

            .login-form {
                padding: 20px 15px;
            }

            .login-form h2 {
                font-size: 20px;
                margin-bottom: 20px;
            }

            .user-info {
                padding: 8px 12px;
                font-size: 13px;
            }

            .messages-container {
                padding: 10px;
            }

            .message {
                max-width: 90%;
                padding: 8px 12px;
                margin-bottom: 10px;
            }

            .input-container {
                padding: 12px;
            }

            .input-container button {
                padding: 8px 16px;
            }

            .new-message-indicator {
                bottom: 70px;
                right: 15px;
            }
        }

        @media (max-width: 480px) {
            .chat-header {
                font-size: 16px;
                padding: 10px 12px;
            }

            .login-form h2 {
                font-size: 18px;
            }

            .message {
                max-width: 95%;
            }

            .message-content {
                font-size: 13px;
            }

            .input-container input {
                padding: 8px 12px;
                font-size: 13px;
            }

            .input-container button {
                padding: 8px 14px;
                font-size: 13px;
            }
        }

        /* 防止iOS Safari的弹性滚动问题 */
        .messages-container {
            -webkit-overflow-scrolling: touch;
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        分布式聊天系统
        <span class="status-indicator" id="statusIndicator"></span>
    </div>

    <!-- 登录表单 -->
    <div class="login-form" id="loginForm">
        <h2>请输入用户名</h2>
        <input type="text" id="usernameInput" placeholder="用户名" autocomplete="off">
        <button onclick="connect()">进入聊天室</button>
    </div>

    <!-- 聊天界面 -->
    <div class="chat-body" id="chatBody">
        <div class="user-info">
            <span>当前用户: <strong id="currentUsername"></strong></span>
            <button onclick="disconnect()">退出</button>
        </div>

        <div class="messages-container" id="messagesContainer">
            <!-- 消息将在这里动态添加 -->
        </div>

        <div class="input-container">
            <input type="text" id="messageInput" placeholder="输入消息..." autocomplete="off" onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()" id="sendButton">发送</button>
        </div>
    </div>
</div>

<div class="new-message-indicator" id="newMessageIndicator" onclick="scrollToBottom()">
    新消息 ↓
</div>

<script>
    let stompClient = null;
    let username = null;
    let isAtBottom = true;
    let unreadMessages = 0;

    // 使用相对路径
    const serverUrl = window.location.origin + '/ws';

    // 连接WebSocket
    function connect() {
        username = document.getElementById('usernameInput').value.trim();
        if (!username) {
            alert('请输入用户名');
            return;
        }

        const socket = new SockJS(serverUrl);
        stompClient = Stomp.over(socket);

        stompClient.connect({}, function (frame) {
            console.log('Connected: ' + frame);
            updateStatus(true);

            // 显示聊天界面
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('chatBody').style.display = 'flex';
            document.getElementById('currentUsername').textContent = username;

            // 订阅公共消息频道
            stompClient.subscribe('/topic/public', function (message) {
                const chatMessage = JSON.parse(message.body);
                displayMessage(chatMessage);
            });

            // 发送加入消息
            stompClient.send("/app/chat.addUser", {},
                JSON.stringify({
                    type: 'JOIN',
                    sender: username,
                    content: username + ' 加入了聊天室',
                    timestamp: new Date().toISOString()
                })
            );

            // 聚焦输入框
            document.getElementById('messageInput').focus();

            // 设置消息容器滚动监听
            const messagesContainer = document.getElementById('messagesContainer');
            messagesContainer.addEventListener('scroll', handleScroll);

        }, function (error) {
            console.error('Connection error: ', error);
            updateStatus(false);
            alert('连接失败，请检查服务器是否启动');
        });
    }

    // 断开连接
    function disconnect() {
        if (stompClient !== null) {
            // 发送离开消息
            stompClient.send("/app/chat.sendMessage", {},
                JSON.stringify({
                    type: 'LEAVE',
                    sender: username,
                    content: username + ' 离开了聊天室',
                    timestamp: new Date().toISOString()
                })
            );
            stompClient.disconnect();
        }
        updateStatus(false);
        document.getElementById('loginForm').style.display = 'flex';
        document.getElementById('chatBody').style.display = 'none';
        document.getElementById('messagesContainer').innerHTML = '';
        document.getElementById('usernameInput').value = '';
        username = null;
    }

    // 发送消息
    function sendMessage() {
        const messageInput = document.getElementById('messageInput');
        const message = messageInput.value.trim();
        if (!message || !stompClient) {
            return;
        }

        const chatMessage = {
            type: 'CHAT',
            sender: username,
            content: message,
            timestamp: new Date().toISOString()
        };

        stompClient.send("/app/chat.sendMessage", {}, JSON.stringify(chatMessage));
        messageInput.value = '';
    }

    // 处理回车键
    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            sendMessage();
        }
    }

    // 显示消息
    function displayMessage(message) {
        const messagesContainer = document.getElementById('messagesContainer');
        const messageElement = document.createElement('div');
        messageElement.className = 'message';

        const isOwnMessage = message.sender === username;
        const isSystemMessage = message.type === 'JOIN' || message.type === 'LEAVE';

        if (isSystemMessage) {
            messageElement.className += ' system';
        } else if (isOwnMessage) {
            messageElement.className += ' own';
        } else {
            messageElement.className += ' other';
        }

        const time = message.timestamp ? new Date(message.timestamp).toLocaleTimeString() : new Date().toLocaleTimeString();

        let content = '';
        if (isSystemMessage) {
            content = message.content;
        } else {
            content = `
                    <div class="message-header">${message.sender}</div>
                    <div class="message-content">${escapeHtml(message.content)}</div>
                    <div class="message-time">${time}</div>
                `;
        }

        messageElement.innerHTML = content;
        messagesContainer.appendChild(messageElement);

        // 自动滚动到底部（如果用户已经在底部）
        if (isAtBottom) {
            scrollToBottom();
        } else {
            // 显示新消息指示器
            unreadMessages++;
            document.getElementById('newMessageIndicator').style.display = 'block';
            document.getElementById('newMessageIndicator').textContent = `${unreadMessages} 条新消息 ↓`;
        }
    }

    // 处理滚动事件
    function handleScroll() {
        const messagesContainer = document.getElementById('messagesContainer');
        const threshold = 50; // 距离底部的阈值

        // 检查是否在底部
        isAtBottom = messagesContainer.scrollHeight - messagesContainer.scrollTop - messagesContainer.clientHeight < threshold;

        // 如果在底部，隐藏新消息指示器并重置计数
        if (isAtBottom && unreadMessages > 0) {
            unreadMessages = 0;
            document.getElementById('newMessageIndicator').style.display = 'none';
        }
    }

    // 滚动到底部
    function scrollToBottom() {
        const messagesContainer = document.getElementById('messagesContainer');
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
        unreadMessages = 0;
        document.getElementById('newMessageIndicator').style.display = 'none';
    }

    // 转义HTML
    function escapeHtml(text) {
        const map = {
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#039;'
        };
        return text.replace(/[&<>"']/g, m => map[m]);
    }

    // 更新连接状态
    function updateStatus(connected) {
        const statusIndicator = document.getElementById('statusIndicator');
        if (connected) {
            statusIndicator.classList.remove('disconnected');
        } else {
            statusIndicator.classList.add('disconnected');
        }
    }

    // 页面加载时聚焦用户名输入框
    window.onload = function() {
        document.getElementById('usernameInput').focus();
    };

    // 处理窗口大小变化
    window.addEventListener('resize', function() {
        if (isAtBottom) {
            scrollToBottom();
        }
    });
</script>
</body>
</html>
