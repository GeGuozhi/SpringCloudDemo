<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>导出测试</title>
  <style>
    :root { --bg:#0b1020; --card:#121a33; --text:#e9eeff; --muted:#a9b4dd; --accent:#6ea8fe; --border:#263156; }
    body { margin:0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "PingFang SC", "Microsoft YaHei", sans-serif; background: radial-gradient(1200px 600px at 10% 10%, #18224a 0%, var(--bg) 55%); color:var(--text); }
    .wrap { max-width: 1100px; margin: 48px auto; padding: 0 18px; }
    .card { background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03)); border:1px solid var(--border); border-radius: 16px; padding: 22px; box-shadow: 0 18px 45px rgba(0,0,0,0.35); }
    h1 { margin: 0 0 6px; font-size: 20px; letter-spacing: .5px;}
    .sub { margin: 0 0 18px; color: var(--muted); font-size: 13px; line-height: 1.5; }
    .grid { display:grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .field { display:flex; flex-direction:column; gap: 6px; }
    label { font-size: 12px; color: var(--muted); }
    input { height: 40px; padding: 0 12px; border-radius: 10px; border:1px solid var(--border); background: rgba(0,0,0,0.22); color: var(--text); outline: none; }
    input:focus { border-color: rgba(110,168,254,0.9); box-shadow: 0 0 0 4px rgba(110,168,254,0.18); }
    .full { grid-column: 1 / -1; }
    .row { display:flex; gap: 10px; align-items:center; margin-top: 14px; flex-wrap: wrap; }
    button { height: 40px; padding: 0 14px; border-radius: 10px; border:1px solid rgba(110,168,254,0.35); background: rgba(110,168,254,0.18); color: var(--text); cursor: pointer; }
    button:hover { background: rgba(110,168,254,0.26); }
    button:disabled { opacity: 0.55; cursor:not-allowed; }
    .hint { color: var(--muted); font-size: 12px; }
    .log { margin-top: 14px; padding: 10px 12px; border-radius: 10px; background: rgba(0,0,0,0.22); border: 1px solid var(--border); font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; font-size: 12px; white-space: pre-wrap; color: #d6defd; }

    /* ---------- 预览表格样式 ---------- */
    #tableWrap { overflow: auto; margin-top: 14px; }
    #previewTitle {
      font-size: 18px; font-weight: 600; text-align: center;
      color: var(--text); margin-bottom: 12px; letter-spacing: .5px;
    }
    #previewTable {
      border-collapse: collapse;
      font-size: 13px;
      table-layout: fixed;
      width: max-content;
      min-width: 100%;
    }
    #previewTable th,
    #previewTable td {
      border: 1px solid var(--border);
      padding: 6px 10px;
      white-space: nowrap;
      text-align: center;
      min-width: 60px;
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #previewTable th {
      background: rgba(110,168,254,0.12);
      color: #c8d6ff;
      font-weight: 500;
    }
    #previewTable thead th { position: sticky; top: 0; z-index: 1; }
    #previewTable tbody tr:hover td { background: rgba(110,168,254,0.06); }
    #previewTable tbody tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
    #previewTable tbody tr:nth-child(even):hover td { background: rgba(110,168,254,0.07); }
    /* 左侧维度列 */
    #previewTable td.left-dim { background: rgba(255,255,255,0.03); color: var(--muted); font-weight: 500; }
    #previewTable td.left-dim:hover { background: rgba(255,255,255,0.07) !important; }
    #previewTable th.left-dim { background: rgba(255,255,255,0.04); color: var(--muted); }
    /* 左冻结 */
    .left-col-0 { position: sticky; left: 0;     z-index: 3; }
    .left-col-1 { position: sticky; left: 80px;   z-index: 3; }
    .left-col-2 { position: sticky; left: 160px;  z-index: 3; }
    .left-col-3 { position: sticky; left: 240px;  z-index: 3; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>导出接口下载测试</h1>
      <p class="sub">
        访问本页：<code>/export-test.html</code>。<br/>
        单分行（branches 不含逗号）下载 <code>.xlsx</code>；多分行（逗号分隔）下载 <code>.zip</code>。
      </p>

      <div class="grid">
        <div class="field">
          <label for="startDate">startDate（yyyy-MM-dd）</label>
          <input id="startDate" placeholder="2025-07-01" value="2025-07-01" />
        </div>
        <div class="field">
          <label for="endDate">endDate（yyyy-MM-dd）</label>
          <input id="endDate" placeholder="2025-09-30" value="2025-09-30" />
        </div>
        <div class="field full">
          <label for="branches">branches（逗号分隔）</label>
          <input id="branches" placeholder="北京 或 北京,上海" value="北京" />
        </div>
        <div class="field full">
          <label for="modelName">modelName（预览用，report_config.model_name）</label>
          <input id="modelName" placeholder="信用拆借" value="信用拆借" />
        </div>
      </div>

      <div class="row">
        <button id="btn">下载</button>
        <button id="btnPreview" type="button">预览</button>
        <span class="hint">接口：<code>POST /api/excel/export-with-merge</code></span>
      </div>

      <div id="log" class="log">ready</div>
      <div id="tableWrap"></div>
    </div>
  </div>

  <script>
    const $ = id => document.getElementById(id);
    const log = msg => { $("log").textContent = msg; };

    function parseFilenameFromContentDisposition(cd) {
      if (!cd) return null;
      const m1 = cd.match(/filename\*\s*=\s*UTF-8''([^;]+)/i);
      if (m1 && m1[1]) return decodeURIComponent(m1[1].replaceAll('"', '').trim());
      const m2 = cd.match(/filename\s*=\s*("?)([^";]+)\1/i);
      if (m2 && m2[2]) return m2[2].trim();
      return null;
    }

    $("btn").addEventListener("click", async () => {
      const startDate = $("startDate").value.trim();
      const endDate   = $("endDate").value.trim();
      const branches  = $("branches").value.trim();
      $("btn").disabled = true;
      log("requesting...");
      try {
        const resp = await fetch("/api/excel/export-with-merge", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ startDate, endDate, branches })
        });
        const ct = resp.headers.get("content-type") || "";
        const cd = resp.headers.get("content-disposition") || "";
        if (!resp.ok) {
          log(`HTTP ${resp.status}\ncontent-type: ${ct}\n\n${await resp.text()}`);
          return;
        }
        if (ct.includes("application/json")) {
          log(`JSON response\n\n${await resp.text()}`);
          return;
        }
        const blob = await resp.blob();
        const filename = parseFilenameFromContentDisposition(cd)
          || (ct.includes("zip") ? "export.zip" : "export.xlsx");
        log(`downloading...\ncontent-type: ${ct}\nfile: ${filename}\nsize: ${blob.size} bytes`);
        const url = URL.createObjectURL(blob);
        const a   = document.createElement("a");
        a.href = url; a.download = filename;
        document.body.appendChild(a);
        a.click(); a.remove();
        URL.revokeObjectURL(url);
      } catch (e) {
        log(String(e && e.stack ? e.stack : e));
      } finally {
        $("btn").disabled = false;
      }
    });

    // =====================================================================
    // 树形表头渲染
    //
    // tableHeaderList  — HeaderNodeVO[]（根节点列表）
    //   HeaderNodeVO { label, pk?, _children? }
    //   - 叶子节点：pk = 列标识（a/b/c...），_children = null
    //   - 非叶子节点：pk = null，_children = 子节点列表
    //
    // tableContentList — List<Map<pk, value>>（行数据，key = 列标识）
    //
    // 合并策略（与 Excel 表头一致）：
    //   - 非叶子节点：colspan = 叶子列数，rowspan = 1
    //   - 叶子节点：colspan = 1，rowspan = 向下延伸到底部表头行
    //   - 左侧维度列（纵向无合并需求）：rowspan = 向下延伸到底部表头行
    // =====================================================================

    function esc(str) {
      return String(str == null ? '' : str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    /** 统计节点树下所有叶子列数（colspan 值） */
    function leafCount(node) {
      if (!node) return 0;
      if (node.pk) return 1;
      if (!node._children) return 1;
      return node._children.reduce((s, c) => s + leafCount(c), 0);
    }

    /** 递归收集叶子 pk（从左到右） */
    function collectPks(nodes, pkOrder) {
      for (const n of nodes) {
        if (n.pk) {
          pkOrder.push(n.pk);
        } else if (n._children && n._children.length) {
          collectPks(n._children, pkOrder);
        }
      }
    }

    /**
     * 检测左侧维度列数。
     * 策略：pkOrder 中连续出现在数据行 keys 中的叶子 pk，即为左侧维度列。
     * 原因：左侧维度列的值出现在 data row 中，而非叶子只起分组作用。
     */
    function detectLeftDimCount(pkOrder, tableContentList) {
      if (!pkOrder || !pkOrder.length) return 0;
      const sample = tableContentList && tableContentList[0];
      if (!sample) return 0;
      let n = 0;
      for (const pk of pkOrder) {
        if (Object.prototype.hasOwnProperty.call(sample, pk)) n++;
        else break;
      }
      return n;
    }

    /**
     * 递归构建表头 HTML 行。
     *
     * @param nodes       当前层节点列表
     * @param depth       当前层深度（0 = 最顶层）
     * @param pkOrder     所有叶子 pk（从左到右，用于判断 leftDim）
     * @param leftDimCount 左侧维度列总数
     * @param maxDepth    最大层级深度
     * @param out         输出数组，out[depth] = 该行 HTML 字符串
     */
    function buildHeaderRows(nodes, depth, pkOrder, leftDimCount, maxDepth, out) {
      if (!nodes || !nodes.length) return;

      if (!out[depth]) out[depth] = '';
      out[depth] += '<tr>';

      for (const node of nodes) {
        const isLeaf = !node._children || !node._children.length;
        const label  = node.label == null ? '' : esc(String(node.label));

        // ---- 计算 colspan / rowspan ----
        let colspan = '';
        let rowspan = '';
        let cls = '';
        let leftDimIdx = -1;

        if (isLeaf) {
          // 叶子：colSpan=1
          colspan = '';
          // rowSpan = 向下延伸到底部表头行（maxDepth+1 行 → 当前 depth 后还有 maxDepth-depth 行）
          const rs = maxDepth - depth + 1;
          rowspan = rs > 1 ? ` rowspan="${rs}"` : '';

          // 是否为左侧维度列
          const pkIdx = pkOrder.indexOf(node.pk);
          if (pkIdx >= 0 && pkIdx < leftDimCount) {
            cls = 'left-dim';
            leftDimIdx = pkIdx;
          }
        } else {
          // 非叶子：colSpan=叶子数，rowSpan=1
          const cs = leafCount(node);
          colspan = cs > 1 ? ` colspan="${cs}"` : '';
          rowspan = '';
        }

        // sticky class（左冻结）
        if (leftDimIdx >= 0 && leftDimIdx < 4) {
          cls = cls ? `${cls} left-col-${leftDimIdx}` : `left-col-${leftDimIdx}`;
        }

        const clsAttr = cls ? ` class="${cls}"` : '';
        out[depth] += `<th${clsAttr}${colspan}${rowspan} title="${label}">${label}</th>`;
      }

      out[depth] += '</tr>';

      // 递归处理子节点（depth+1 层）
      const children = [];
      for (const node of nodes) {
        if (node._children && node._children.length) {
          children.push(...node._children);
        }
      }
      if (children.length > 0) {
        buildHeaderRows(children, depth + 1, pkOrder, leftDimCount, maxDepth, out);
      }
    }

    /** 计算树的最大层级深度 */
    function calcMaxDepth(nodes, depth) {
      if (!nodes || !nodes.length) return depth - 1;
      let max = depth;
      for (const n of nodes) {
        if (n._children && n._children.length) {
          max = Math.max(max, calcMaxDepth(n._children, depth + 1));
        }
      }
      return max;
    }

    /**
     * 渲染树形表头 + 合并单元格数据
     *
     * @param title             报表标题
     * @param headerTree        HeaderNodeVO[]  根节点列表
     * @param tableContentList  List<Map<pk, value>>  行数据
     */
    function renderMergedTable(title, headerTree, tableContentList) {
      const wrap = $("tableWrap");
      wrap.innerHTML = '';
      if (!headerTree || !headerTree.length) return;

      // 1. 收集所有叶子 pk（从左到右顺序）
      const pkOrder = [];
      collectPks(headerTree, pkOrder);

      // 2. 左侧维度列数
      const leftDimCount = detectLeftDimCount(pkOrder, tableContentList);

      // 3. 计算最大层级深度（用于叶子节点 rowspan）
      const maxDepth = calcMaxDepth(headerTree, 0);

      // 4. 构建表头行 HTML
      const rows = [];
      buildHeaderRows(headerTree, 0, pkOrder, leftDimCount, maxDepth, rows);
      const headerHtml = rows.join('');

      // 5. 构建数据行 HTML
      const dataRows = tableContentList || [];
      let dataHtml = '';
      for (const row of dataRows) {
        dataHtml += '<tr>';
        for (let ci = 0; ci < pkOrder.length; ci++) {
          const pk   = pkOrder[ci];
          const text = row && row[pk] != null ? esc(String(row[pk])) : '';
          const isLD = ci < leftDimCount;
          const cls  = isLD ? `left-dim${ci < 4 ? ` left-col-${ci}` : ''}` : '';
          const clsAttr = cls ? ` class="${cls}"` : '';
          dataHtml += `<td${clsAttr} title="${text}">${text}</td>`;
        }
        dataHtml += '</tr>';
      }

      // 6. 组装最终 HTML
      let html = '';
      if (title && title.trim()) {
        html += `<div id="previewTitle">${esc(title)}</div>`;
      }
      html += `<table id="previewTable"><thead>${headerHtml}</thead><tbody>${dataHtml}</tbody></table>`;
      wrap.innerHTML = html;
    }

    // =====================================================================
    // 预览接口调用
    // =====================================================================

    $("btnPreview").addEventListener("click", async () => {
      const startDate = $("startDate").value.trim();
      const endDate   = $("endDate").value.trim();
      const branch    = $("branches").value.trim().split(",")[0].trim();
      const modelName = $("modelName").value.trim();

      $("btnPreview").disabled = true;
      log("preview requesting...");
      $("tableWrap").innerHTML = "";

      try {
        const resp = await fetch("/api/excel/preview", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ startDate, endDate, branch, modelName })
        });

        const text = await resp.text();
        if (!resp.ok) {
          log(`HTTP ${resp.status}\n\n${text}`);
          return;
        }

        const json = JSON.parse(text);
        if (json && json.code === 200 && json.data) {
          const d = json.data;
          log(`preview ok — title: "${d.title}", 表头节点数: ${(d.tableHeaderList||[]).length}, 数据行数: ${(d.tableContentList||[]).length}`);
          renderMergedTable(d.title, d.tableHeaderList, d.tableContentList);
        } else {
          log(text);
        }
      } catch (e) {
        log(String(e && e.stack ? e.stack : e));
      } finally {
        $("btnPreview").disabled = false;
      }
    });
  </script>
</body>
</html>
