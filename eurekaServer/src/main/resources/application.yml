# 主配置文件 - 公共配置
spring:
  application:
    name: eureka-server
  main:
    allow-bean-definition-overriding: true
  profiles:
    active: local  # 默认激活local环境

# 公共的eureka配置
eureka:
  instance:
    hostname: ${EUREKA_HOSTNAME:localhost}
  client:
    register-with-eureka: false
    fetch-registry: true
    service-url:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/
  server:
    enable-self-preservation: ${EUREKA_SELF_PRESERVATION:false}
    eviction-interval-timer-in-ms: ${EUREKA_EVICTION_INTERVAL:500}

# 服务器配置
server:
  port: ${SERVER_PORT:8761}

# 日志配置
logging:
  level:
    root: INFO
    com.ggz: DEBUG
